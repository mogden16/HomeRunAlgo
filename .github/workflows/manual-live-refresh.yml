name: Live Refresh

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Refresh mode to run
        required: true
        type: choice
        options:
          - auto
          - settle
          - prepare
          - publish
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: live-refresh
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Resolve requested mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            echo "REFRESH_MODE=auto" >> "$GITHUB_ENV"
            echo "Scheduled refresh mode=auto"
          else
            echo "REFRESH_MODE=${INPUT_MODE}" >> "$GITHUB_ENV"
            echo "Manual refresh mode=${INPUT_MODE}"
          fi

      - name: Run shared refresh mode
        run: |
          extra_args=""
          if [ "${REFRESH_MODE}" = "publish" ] || [ "${REFRESH_MODE}" = "auto" ]; then
            extra_args="--refresh-results-before-publish"
          fi
          python scripts/run_refresh_mode.py --mode "${REFRESH_MODE}" $extra_args

      - name: Commit and push changes
        env:
          REFRESH_MODE: ${{ env.REFRESH_MODE }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys

          mode = os.environ["REFRESH_MODE"]
          target_branch = os.environ.get("TARGET_BRANCH") or "master"
          tracked = [
              "data/live/current_picks.json",
              "data/live/pick_history.json",
              "data/live/morning_baseline_picks.json",
              "cloudflare-app/data/dashboard.json",
          ]
          force_add = []
          if mode in {"prepare", "auto"}:
              force_add.extend(
                  [
                      "data/live/model_bundle.pkl",
                      "data/live/model_metadata.json",
                      "data/live/draft_picks.json",
                  ]
              )

          subprocess.run(["git", "config", "user.name", "github-actions[bot]"], check=True)
          subprocess.run(["git", "config", "user.email", "41898282+github-actions[bot]@users.noreply.github.com"], check=True)
          subprocess.run(["git", "add", "--", *tracked], check=True)
          for path in force_add:
              if os.path.exists(path):
                  subprocess.run(["git", "add", "-f", "--", path], check=True)

          unstaged = subprocess.run(
              ["git", "diff", "--name-only"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()
          if unstaged:
              print("Refusing to rebase with unstaged tracked changes:")
              print(unstaged)
              sys.exit(1)

          diff = subprocess.run(
              ["git", "diff", "--cached", "--quiet"],
              check=False,
          )
          if diff.returncode == 0:
              print("No staged refresh changes detected.")
              sys.exit(0)

          commit_label = "scheduled" if mode == "auto" else "manual"
          subprocess.run(["git", "commit", "-m", f"chore: {commit_label} {mode} refresh"], check=True)
          subprocess.run(["git", "fetch", "origin", target_branch], check=True)
          subprocess.run(
              ["git", "rebase", "-X", "theirs", f"origin/{target_branch}"],
              check=True,
          )
          subprocess.run(["git", "push", "origin", f"HEAD:{target_branch}"], check=True)
          PY
